<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />

    <meta name="description" content="AI-Powered Website Fortress Generator. Find vulnerabilities and fortify in 90 seconds." />
    <meta name="author" content="SECUREWEB AI" />
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#00d4ff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" 
          content="black-translucent">
    <meta name="apple-mobile-web-app-title" 
          content="SecureWeb AI">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <meta property="og:title" content="SECUREWEB AI - Website Security Scanner" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@SecureWeb" />

    <script>
      // Catch install prompt BEFORE React loads
      window.deferredInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window.deferredInstallPrompt = e;
        // Dispatch custom event so React can catch it
        window.dispatchEvent(
          new CustomEvent('pwaInstallReady')
        );
      });
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js');
        });
      }
    </script>
    <script type="module" src="/frontend/src/main.tsx"></script>
  </body>
</html>
